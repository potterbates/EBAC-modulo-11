<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>Home</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>
        <img src="css/pc.png" alt="Computador">
    <main>
        <section class="bemVindo">
            <h1>Bem-vindo ao nosso site</h1>
            <p>Estamos felizes em tê-lo aqui!</p>
        </section>
        <section class="sobre">
            <h2>Sobre nós</h2>
            <p>Somos uma empresa dedicada a fornecer os melhores serviços para nossos clientes.</p>
        </section>
        <section class="servicos">
            <div>
                <h3>Design Gráfico</h3>
            </div>
            <div>
                <h3>Desenvolvimento Web</h3>
            </div>
            <div>
                <h3>Marketing Digital</h3>
            </div>
            <div>
                <h3>Consultoria</h3>
            </div>
        </section>
        <section class="formulario">
            <h2>Contato</h2>
            <form action="/submit" method="post">
                <input type="text" id="name" name="name" placeholder="Nome" required>
                <input type="email" id="email" name="email" placeholder="Email" required>
                <input type="tel" id="numero" name="numero" placeholder="Telefone" required>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Todos os direitos reservados.</p>
    </footer>
</body>

</html>
